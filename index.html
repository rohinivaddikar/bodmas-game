<!DOCTYPE html>
<html>
<head>
    <title>BODMAS Interactive Game</title>

    <!-- ADD THIS LINE -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <h1>BODMAS Interactive Learning Game</h1>

    <h2 id="expression">5 + 3 × 2</h2>

    <p id="instruction">👉 Click the operation to solve first:</p>

    <div id="options">
        <button onclick="choose('add')">5 + 3</button>
        <button onclick="choose('multiply')">3 × 2</button>
    </div>

    <h3 id="feedback"></h3>

    <script src="script.js"></script>

</body>
</html>
